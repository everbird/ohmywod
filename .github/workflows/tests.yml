name: tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Check changed lines for whitespace errors
        env:
          DIFF_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if git cat-file -e "${DIFF_BASE}^{commit}" 2>/dev/null; then
            git diff --check "$DIFF_BASE" "$GITHUB_SHA"
          else
            git show --check --format=fuller "$GITHUB_SHA"
          fi

      - name: Run test suite
        run: python -m pytest tests/ --cov=ohmywod -v
